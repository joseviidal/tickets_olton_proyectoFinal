<!-- En está pagina la empresa podrá comprobar el estado de los tickets subidos, y podrán comprobar si están abiertos o cerrados -->
{% load static %}

<!DOCTYPE html>

<html>

<head>
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="{% static 'css/gestion.css' %}">
    <link rel="stylesheet" href="{% static 'css/cabecera.css' %}">
    <link rel="icon" href="{% static 'img/olton.png' %}">

</head>

<body>

    <div class="cabecera">
        <a href="/">
            <img src="{% static 'img/sistemas olton.png' %}" alt="logo" class="logo_cabecera">
        </a>

        <a href="/perfil/">            
            <svg class="user_cabecera" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
            </svg>
        </a>
    </div>


    <h1>Comprobar tickets</h1>

    <div class="tickets">
        <!-- Aqui se van a mostrar todos los tickets de la base de datos -->
    </div>

    <script>
        const ticketsContainer = document.querySelector('.tickets');

        function showMessage(message) {
            ticketsContainer.innerHTML = `<p>${message}</p>`;
        }

        function renderTickets(tickets) {
            if (!Array.isArray(tickets) || tickets.length === 0) {
                showMessage('No hay tickets disponibles.');
                return;
            }

            const rows = tickets.map(ticket => {
                const fecha = ticket.fecha_creacion ? new Date(ticket.fecha_creacion).toLocaleString() : '';
                return `
                    <tr>
                        <td>${ticket.id || ''}</td>
                        <td>${ticket.empresa || ''}</td>
                        <td>${ticket.contacto || ''}</td>
                        <td>${ticket.tipo_dispositivo || ''}</td>
                        <td>${ticket.id_dispositivo || ''}</td>
                        <td>${ticket.observaciones || ''}</td>
                        <td>${ticket.portes || ''}</td>
                        <td>${ticket.empresa_transporte || ''}</td>
                        <td>${fecha}</td>
                    </tr>`;
            }).join('');

            ticketsContainer.innerHTML = `
                <table class="tickets-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Empresa</th>
                            <th>Contacto</th>
                            <th>Tipo dispositivo</th>
                            <th>ID dispositivo</th>
                            <th>Observaciones</th>
                            <th>Portes</th>
                            <th>Empresa transporte</th>
                            <th>Creado</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>`;
        }

        function loadTickets() {
            const headers = {};
            const token = localStorage.getItem('token_sesion');
            if (token) {
                headers['Session'] = token;
            }

            fetch('/tickets_android/', {
                method: 'GET',
                headers
            })
                .then(response => response.json().then(data => ({ status: response.status, ok: response.ok, data })))
                .then(({ status, ok, data }) => {
                    if (!ok) {
                        const message = data && data.error ? data.error : `Error al cargar tickets (HTTP ${status})`;
                        showMessage(message);
                        return;
                    }
                    renderTickets(data);
                })
                .catch(error => {
                    console.error('Error al cargar tickets:', error);
                    showMessage('No se pudieron cargar los tickets. Revisa la consola para más detalles.');
                });
        }

        document.addEventListener('DOMContentLoaded', loadTickets);
    </script>

</body>

</html>
